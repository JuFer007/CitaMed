<div>
  <span class="inline-block px-4 py-1.5 rounded-full bg-[#36b1ae]/10 text-[#0f8b86] text-xs font-semibold tracking-widest uppercase mb-4">Pagos</span>
  <h2 class="text-3xl font-bold text-[#083d3a] leading-tight">Facturas y comprobantes</h2>
  <p class="text-sm text-[#4d6d6b] mt-2 mb-8">Revisa y paga tus consultas directamente desde el portal.</p>

  <div *ngIf="pagos.length === 0" class="text-center py-16">
    <span class="mso !text-5xl text-[#c8e8e6] block mb-4">payments</span>
    <p class="text-sm text-[#6b8c89]">No tienes facturas pendientes</p>
  </div>

  <div *ngIf="pagos.length > 0" class="bg-white rounded-3xl shadow-xl shadow-[#36b1ae]/10 ring-1 ring-[#36b1ae]/10 overflow-hidden">
    <div class="hidden sm:grid grid-cols-[2fr_1fr_1fr_1fr_1.4fr] gap-4 px-6 py-3 text-[11px] font-semibold uppercase tracking-wide text-[#6b7280] border-b border-[#e5e7eb]">
      <div>Concepto</div><div>Fecha</div><div>Monto</div><div>Estado</div><div class="text-right">Acciones</div>
    </div>

    <div *ngFor="let p of pagos" class="grid sm:grid-cols-[2fr_1fr_1fr_1fr_1.4fr] gap-2 sm:gap-4 items-center px-6 py-4 border-b border-[#e5e7eb] last:border-0">
      <div>
        <div class="text-sm font-semibold text-[#083d3a]">{{ p.concepto }}</div>
        <div class="text-xs text-[#6b8c89] mt-0.5">{{ p.medico }} · {{ p.especialidad }}</div>
      </div>
      <div class="text-sm text-[#6b8c89]">{{ formatearFecha(p.fecha) }}</div>
      <div class="text-sm font-semibold text-[#083d3a]">S/ {{ p.monto.toFixed(2) }}</div>
      <div><span class="px-3 py-1 rounded-full text-[11px] font-semibold w-fit inline-block" [class]="estadoClase(p.estado)">{{ p.estado }}</span></div>
      <div class="flex sm:justify-end gap-2">
        <button *ngIf="p.estado !== 'PAGADO'" (click)="pagarAhora(p)" class="bg-[#36b2ac] text-white px-4 py-2 rounded-md text-xs font-semibold hover:bg-[#2b9a95] shadow-lg shadow-[#36b2ac]/20 transition">Pagar ahora</button>
        <button *ngIf="p.estado === 'PAGADO'" (click)="descargarTicket(p)" class="bg-white text-[#36b2ac] ring-1 ring-inset ring-[#36b2ac]/20 px-4 py-2 rounded-md text-xs font-semibold hover:bg-[#f5ffff] transition">Descargar ticket</button>
      </div>
    </div>
  </div>
</div>
