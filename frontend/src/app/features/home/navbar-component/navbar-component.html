<nav [ngClass]="{
    'py-4 bg-white/80 backdrop-blur-md border-b border-[#52b788]/20': isScrolled,
    'py-8 bg-transparent': !isScrolled
  }" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 ease-in-out text-[#1b1b1b]">
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">

    <!-- Logo -->
    <div class="flex items-center space-x-2">
      <a routerLink="/inicio" class="font-display text-2xl tracking-tighter">
        <img src="logoCitaMed.png" alt="Logo" class="w-18 h-18">
      </a>
    </div>

    <!-- LINKS DESKTOP -->
    <div class="hidden md:flex items-center space-x-8">
      <button
        (click)="scrollToSection('especialidades')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Especialidades
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>

      <button
        (click)="scrollToSection('doctores')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Nuestros doctores
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>

      <button
        (click)="scrollToSection('contacto')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Contacto
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>

      <button
        (click)="scrollToSection('testimonios')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Testimonios
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>
    </div>

    <!-- Botón login + menú mobile -->
    <div class="flex items-center gap-4">
      @if (isLoggedIn) {
      <div class="relative hidden md:block">
        <button (click)="toggleMenuPerfil()"
          class="flex items-center cursor-pointer gap-3 px-4 py-2 rounded-full border border-current opacity-70 hover:opacity-100 transition-all duration-300">
          <div class="w-7 h-7 rounded-full bg-[#2d6a4f] text-white flex items-center justify-center text-xs font-bold">
            {{ inicial }}
          </div>
          <span class="text-[10px] uppercase tracking-[0.2em] font-medium">{{ nombre }}</span>
          <span class="material-symbols-outlined text-sm">expand_more</span>
        </button>
      </div>
      }
      
      <!-- Botón hamburguesa -->
      <button class="md:hidden" (click)="toggleMenuMobile()">
        <span class="material-symbols-outlined">{{ menuMobile ? 'close' : 'menu' }}</span>
      </button>
    </div>
  </div>

  <!-- Menú Mobile -->
  @if (menuMobile) {
  <div class="md:hidden bg-white border-t border-gray-200 px-6 py-4 flex flex-col gap-4 shadow-lg">

    <button (click)="scrollToSection('especialidades')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Especialidades
    </button>

    <button (click)="scrollToSection('doctores')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Nuestros doctores
    </button>

    <button (click)="scrollToSection('contacto')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Contacto
    </button>

    <button (click)="scrollToSection('testimonios')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Testimonios
    </button>

    <hr class="border-gray-200">

    @if (!isLoggedIn) {
    <a routerLink="/login" (click)="menuMobile=false"
      class="flex items-center gap-2 text-[10px] uppercase tracking-[0.2em] font-medium px-5 py-2.5 rounded-full border border-[#36b2ac] text-[#36b2ac] hover:bg-[#36b2ac] hover:text-white transition-all duration-500 w-fit">
      <span class="material-symbols-outlined text-sm">login</span>
      Iniciar Sesión
    </a>
    }

    @if (isLoggedIn) {
    <div class="flex items-center gap-3 mb-2">
      <div class="w-7 h-7 rounded-full bg-[#2d6a4f] text-white flex items-center justify-center text-xs font-bold">
        {{ inicial }}
      </div>
      <span class="text-[10px] uppercase tracking-[0.2em] font-medium text-[#1b1b1b]">{{ nombre }}</span>
    </div>
    <a href="#" (click)="menuMobile=false"
      class="flex items-center gap-3 text-[10px] uppercase tracking-widest text-[#6b7280] hover:text-[#36b2ac] transition-colors">
      <span class="material-symbols-outlined text-sm text-[#52b788]">person</span>
      Mi perfil
    </a>
    <button (click)="cerrarSesion(); menuMobile=false"
      class="flex items-center gap-3 text-[10px] uppercase tracking-widest text-red-400 hover:text-red-600 transition-colors">
      <span class="material-symbols-outlined text-sm">logout</span>
      Cerrar sesión
    </button>
    }
  </div>
  }
</nav>
