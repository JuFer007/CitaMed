<nav [ngClass]="{
    'py-4 bg-white/80 backdrop-blur-md border-b border-[#52b788]/20': isScrolled,
    'py-8 bg-transparent': !isScrolled
  }" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 ease-in-out text-[#1b1b1b]">
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">

    <!-- Logo -->
    <div class="flex items-center space-x-2">
      <a routerLink="/inicio" class="font-display text-2xl tracking-tighter">
        <img src="logoCitaMed.png" alt="Logo" class="w-18 h-18">
      </a>
    </div>

    <!-- LINKS DESKTOP -->
    <div class="hidden md:flex items-center space-x-8">
      <button (click)="scrollToSection('especialidades')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Especialidades
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>

      <button (click)="scrollToSection('doctores')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Nuestros doctores
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>

      <button (click)="scrollToSection('reserva')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Reserva
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>

      <button (click)="scrollToSection('consultas')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Contacto
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>

      <button (click)="scrollToSection('testimonios')"
        class="relative group cursor-pointer text-xs uppercase tracking-[0.18em] font-semibold text-black transition-all duration-300 bg-transparent border-none">
        Testimonios
        <span
          class="absolute left-0 -bottom-1 h-[2px] w-0 bg-[#36b2ac] rounded-full transition-all duration-300 group-hover:w-full">
        </span>
      </button>
    </div>

    <!-- Botón login / perfil + menú mobile -->
    <div class="flex items-center gap-4">

      <!-- Perfil / Login -->
      @if (isLoggedIn) {
        <a routerLink="/portal" class="flex items-center gap-1.5 text-xs uppercase tracking-[0.14em] font-semibold text-[#6b7280] hover:text-[#0f8b86] transition">
          <span class="material-symbols-outlined !text-lg">account_circle</span>
          <span class="hidden sm:inline">Mi portal PACIENTE</span>
        </a>
      } @else {
        <a routerLink="/login" class="flex items-center gap-1.5 text-xs uppercase tracking-[0.14em] font-semibold text-[#6b7280] hover:text-[#0f8b86] transition">
          <span class="material-symbols-outlined !text-lg">person</span>
          <span class="hidden sm:inline">Ingresar</span>
        </a>
      }

      <!-- Botón hamburguesa -->
      <button class="md:hidden bg-transparent border-none cursor-pointer" (click)="toggleMenuMobile()">
        <span class="material-symbols-outlined">{{ menuMobile ? 'close' : 'menu' }}</span>
      </button>
    </div>
  </div>

  <!-- Menú Mobile -->
  @if (menuMobile) {
  <div class="md:hidden bg-white border-t border-gray-200 px-6 py-4 flex flex-col gap-4 shadow-lg">

    <button (click)="scrollToSection('especialidades')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Especialidades
    </button>

    <button (click)="scrollToSection('doctores')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Nuestros doctores
    </button>

    <button (click)="scrollToSection('reserva')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Reserva
    </button>

    <button (click)="scrollToSection('consultas')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Contacto
    </button>

    <button (click)="scrollToSection('testimonios')"
      class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#6b7280] hover:text-[#36b2ac] transition-colors bg-transparent border-none cursor-pointer">
      Testimonios
    </button>

    <hr class="border-gray-200">

    @if (isLoggedIn) {
      <button (click)="cerrarSesion()"
        class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-red-500 hover:text-red-700 transition-colors bg-transparent border-none cursor-pointer flex items-center gap-2">
        <span class="material-symbols-outlined !text-base">logout</span>
        Cerrar sesión
      </button>
    } @else {
      <a routerLink="/login"
        class="text-left text-[10px] uppercase tracking-[0.2em] font-medium text-[#0f8b86] hover:text-[#046c6b] transition-colors">
        Iniciar sesión
      </a>
    }

  </div>
  }
</nav>
