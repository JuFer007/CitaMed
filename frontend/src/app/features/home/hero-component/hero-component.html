<!-- 1. Hero Section -->
<div id="home-hero" class="relative overflow-hidden bg-[#e8f8f7]/40 pt-32 pb-24 lg:pt-40 lg:pb-32">

    <!-- Fondo decorativo -->
    <div class="absolute inset-0 z-0 opacity-[0.04] pointer-events-none"
        style="background-image: radial-gradient(#36b2ac 1px, transparent 1px); background-size: 32px 32px;">
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <div class="lg:grid lg:grid-cols-12 lg:gap-16 items-center">

            <!-- Texto -->
            <div class="lg:col-span-6 space-y-8 reveal">

                <div
                    class="inline-flex items-center px-3 py-1.5 rounded-full bg-[#36b2ac]/10 text-[#0f8b86] text-xs font-medium ring-1 ring-inset ring-[#36b2ac]/30">
                    <span class="flex h-1.5 w-1.5 rounded-full bg-[#36b2ac] mr-2"></span>
                    Clínica mejor valorada
                </div>

                <h1 class="text-4xl sm:text-5xl lg:text-6xl tracking-tight font-semibold text-[#083d3a] leading-[1.1]">
                    Tu salud en línea, rápida y segura.
                </h1>

                <p class="text-lg text-[#4d6d6b] max-w-lg leading-relaxed" style="text-align: justify;">
                    Atención médica profesional con especialistas calificados y tecnología moderna.
                    Agenda tus citas de forma fácil, rápida y desde cualquier lugar.
                </p>

                <div class="flex flex-col sm:flex-row gap-4 pt-2">

                    <!-- Botón principal -->
                    <a href="#booking"
                        class="bg-[#36b2ac] text-white px-6 py-3.5 rounded-md text-sm font-medium hover:bg-[#2b9a95] shadow-lg shadow-[#36b2ac]/20 transition-all flex items-center justify-center">
                        Agendar cita
                        <iconify-icon icon="solar:calendar-add-linear" class="ml-2" width="18"
                            stroke-width="1.5"></iconify-icon>
                    </a>

                    <!-- Botón secundario -->
                    <a href="tel:922626148"
                        class="bg-white text-[#36b2ac] ring-1 ring-inset ring-[#36b2ac]/20 px-6 py-3.5 rounded-md text-sm font-medium hover:bg-[#f5ffff] transition-all flex items-center justify-center">
                        <iconify-icon icon="solar:phone-calling-linear" class="mr-2 text-[#36b2ac]" width="18"
                            stroke-width="1.5"></iconify-icon>
                        Llama ahora
                    </a>

                </div>
            </div>

            <!-- Imagen -->
            <div class="lg:col-span-6 mt-16 lg:mt-0 relative reveal">

                <div
                    class="relative rounded-2xl overflow-hidden shadow-2xl shadow-[#36b2ac]/10 ring-1 ring-[#36b2ac]/10 aspect-[4/3] bg-gray-100">

                    <img [src]="imagenActual" alt="Doctor profesional" class="object-cover w-full h-full"
                        loading="eager" />

                    <div class="absolute inset-0 bg-gradient-to-tr from-[#0f8b86]/30 to-transparent mix-blend-multiply">
                    </div>
                </div>

                <!-- Tarjeta flotante izquierda -->
                <div
                    class="absolute -left-6 top-12 animate-float bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-xl shadow-[#36b2ac]/10 ring-1 ring-[#36b2ac]/10 flex items-center space-x-3">

                    <div class="w-10 h-10 bg-[#36b2ac]/10 rounded-full flex items-center justify-center text-[#36b2ac]">
                        <iconify-icon icon="solar:shield-check-linear" width="24" stroke-width="1.5"></iconify-icon>
                    </div>

                    <div>
                        <p class="text-xs font-semibold text-[#083d3a] tracking-tight">Certificados</p>
                        <p class="text-[10px] text-[#6b8c89] uppercase tracking-wider">Profesionales</p>
                    </div>
                </div>

                <!-- Tarjeta flotante derecha -->
                <div
                    class="absolute -right-8 bottom-1/4 animate-float-delayed bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-xl shadow-[#36b2ac]/10 ring-1 ring-[#36b2ac]/10 flex items-center space-x-3">

                    <div class="w-10 h-10 bg-[#36b2ac]/10 rounded-full flex items-center justify-center text-[#36b2ac]">
                        <iconify-icon icon="solar:heart-pulse-linear" width="24" stroke-width="1.5"></iconify-icon>
                    </div>

                    <div>
                        <p class="text-xs font-semibold text-[#083d3a] tracking-tight">Atención 24/7</p>
                        <p class="text-[10px] text-[#6b8c89] uppercase tracking-wider">Disponible</p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
