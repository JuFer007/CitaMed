<div class="relative w-full h-screen flex items-center justify-center p-4 overflow-hidden">
  <div class="absolute inset-0 z-0 custom-pattern opacity-[0.50]"></div>
  <div class="relative z-10 flex flex-col md:flex-row w-full max-w-4xl bg-white/70 backdrop-blur-3xl rounded-[32px] overflow-hidden shadow-[0_40px_100px_rgba(0,121,107,0.15)] min-h-[520px] border border-white/20">
    <!-- IZQUIERDA -->
    <div class="relative w-full md:w-[380px] bg-[#00796B] p-10 flex flex-col justify-end overflow-hidden">
      <img src="https://images.unsplash.com/photo-1551601651-2a8555f1a136?q=80&w=847&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        class="absolute inset-0 w-full h-full object-cover opacity-100 mix-blend-soft-light">
      <div class="absolute inset-0 bg-gradient-to-t from-[#004D40] via-[#00796B]/60 to-transparent"></div>
      <div class="relative z-10 h-full flex flex-col">
        <div class="mt-auto">
          <h2 class="text-3xl font-bold text-white leading-tight mb-3">
            Recupera tu <br>
            <span class="text-[#80CBC4]">Contraseña</span>
          </h2>
          <p class="text-white/80 text-sm leading-relaxed mb-8">
            Ingresa tu correo electrónico y te enviaremos un código de verificación.
          </p>
        </div>
      </div>
    </div>
    <!-- DERECHA -->
    <div class="flex-1 p-8 md:p-14 flex flex-col justify-center relative bg-white/90">
      <button routerLink="/login"
        class="absolute top-8 left-8 flex items-center gap-2 text-[#00796B]/70 text-xs font-bold uppercase tracking-widest hover:text-[#00796B] transition-colors">
        <span class="mso !text-lg">arrow_back</span>
        Volver al login
      </button>
      <div class="max-w-[340px] mx-auto w-full flex flex-col items-center">
        <div class="mb-6 flex flex-col items-center">
          <div class="w-23 h-23 bg-white rounded-[24px] flex items-center justify-center overflow-hidden mb-4" style="margin-top: 15px;">
            <img src="/logoCitaMed.png" class="w-full h-full object-contain">
          </div>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight text-center">
          Recuperar Contraseña
        </h1>
        <p class="text-slate-600 text-sm mt-2 mb-8 text-center">
          Ingresa el correo de tu cuenta
        </p>
        <!-- FORM -->
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5 w-full">
          <div class="group">
            <div class="relative">
              <span class="mso absolute left-4 top-1/2 -translate-y-1/2 text-[#00796B]/40 group-focus-within:text-[#00796B]">email</span>
              <input type="email" formControlName="email" placeholder="Correo electrónico"
                class="w-full pl-12 pr-4 py-4 bg-slate-50/80 border border-slate-200/60 rounded-2xl outline-none focus:ring-2 focus:ring-[#00796B]/30 transition-all text-sm font-medium placeholder:text-slate-400 shadow-inner">
            </div>
          </div>
          <div *ngIf="errorMessage" class="text-red-500 text-sm text-center">
            {{ errorMessage }}
          </div>
          <div class="flex justify-center mt-2">
            <button type="submit" [disabled]="form.invalid"
              class="w-50 bg-[#00796B] hover:bg-[#004D40] text-white font-bold py-3 rounded-xl shadow-lg shadow-teal-950/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-sm disabled:opacity-50 disabled:cursor-not-allowed">
              Enviar Código
            </button>
          </div>
        </form>
        <div class="mt-8 text-center">
          <span class="text-xs text-slate-500">¿Recordaste tu contraseña? </span>
          <a routerLink="/login" class="text-xs font-bold text-[#00796B] hover:text-[#004D40]">Volver al login</a>
        </div>
      </div>
    </div>
  </div>
</div>
