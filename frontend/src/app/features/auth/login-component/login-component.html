<!-- Contenedor -->
<div class="relative w-full h-screen flex items-center justify-center p-4 overflow-hidden">
  <!-- Fondo -->
  <div class="absolute inset-0 z-0 custom-pattern opacity-[0.50]"></div>
  <!-- Card -->
  <div
    class="relative z-10 flex flex-col md:flex-row w-full max-w-4xl bg-white/70 backdrop-blur-3xl rounded-[32px] overflow-hidden shadow-[0_40px_100px_rgba(0,121,107,0.15)] min-h-[580px] border border-white/20">
    <!-- IZQUIERDA -->
    <div class="relative w-full md:w-[380px] bg-[#00796B] p-10 flex flex-col justify-end overflow-hidden">
      <img src="https://images.unsplash.com/photo-1579684385127-1ef15d508118?w=700&q=85&fit=crop"
        class="absolute inset-0 w-full h-full object-cover opacity-100 mix-blend-soft-light">
      <div class="absolute inset-0 bg-gradient-to-t from-[#004D40] via-[#00796B]/60 to-transparent"></div>
      <div class="relative z-10 h-full flex flex-col">
        <div class="mt-auto">
          <h2 class="text-3xl font-bold text-white leading-tight mb-3">
            Bienvenido al <br>
            <span class="text-[#80CBC4]">Sistema Médico</span>
          </h2>
          <p class="text-white/80 text-sm leading-relaxed mb-8">
            Control total de tu centro de salud en un solo lugar.
          </p>
          <div class="space-y-4 border-t border-white/20 pt-8">
            <div class="flex items-center gap-4 text-white/90">
              <span class="mso text-[#80CBC4]">verified</span>
              <span class="text-xs font-medium">Gestión Profesional</span>
            </div>
            <div class="flex items-center gap-4 text-white/90">
              <span class="mso text-[#80CBC4]">shield_person</span>
              <span class="text-xs font-medium">Privacidad Garantizada</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- DERECHA -->
    <div class="flex-1 p-8 md:p-14 flex flex-col justify-center relative bg-white/90">
      <button routerLink="/inicio"
        class="absolute top-8 left-8 flex items-center gap-2 text-[#00796B]/70 text-xs font-bold uppercase tracking-widest hover:text-[#00796B] transition-colors">
        <span class="mso !text-lg">arrow_back</span>
        Regresar
      </button>
      <div class="max-w-[340px] mx-auto w-full flex flex-col items-center">
        <!-- Logo -->
        <div class="mb-6 flex flex-col items-center">
          <div class="w-23 h-23 bg-white rounded-[24px] flex items-center justify-center overflow-hidden mb-4"
            style="margin-top: 15px;">
            <img src="/logoCitaMed.png" class="w-full h-full object-contain">
          </div>
        </div>
        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight text-center">
          Iniciar Sesión
        </h1>
        <p class="text-slate-600 text-sm mt-2 mb-8 text-center">
          Ingresa tus credenciales de acceso
        </p>
        <!-- FORM -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5 w-full">
          <!-- Usuario -->
          <div class="group">
            <div class="relative">
              <span
                class="mso absolute left-4 top-1/2 -translate-y-1/2 text-[#00796B]/40 group-focus-within:text-[#00796B]">
                person
              </span>
              <input type="text" formControlName="usuario" placeholder="Usuario"
                class="w-full pl-12 pr-4 py-4 bg-slate-50/80 border border-slate-200/60 rounded-2xl outline-none focus:ring-2 focus:ring-[#00796B]/30 transition-all text-sm font-medium placeholder:text-slate-400 shadow-inner">
            </div>
          </div>
          <!-- Password -->
          <div class="group">
            <div class="relative">
              <span
                class="mso absolute left-4 top-1/2 -translate-y-1/2 text-[#00796B]/40 group-focus-within:text-[#00796B]">
                lock
              </span>
              <input [type]="verPassword ? 'text' : 'password'" formControlName="clave" placeholder="Contraseña"
                class="w-full pl-12 pr-12 py-4 bg-slate-50/80 border border-slate-200/60 rounded-2xl outline-none focus:ring-2 focus:ring-[#00796B]/30 transition-all text-sm font-medium placeholder:text-slate-400 shadow-inner">
              <button type="button" (click)="togglePassword()"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-[#00796B]">
                <span class="mso">
                  {{ verPassword ? 'visibility_off' : 'visibility' }}
                </span>
              </button>
            </div>
          </div>
          <!-- Error -->
          <div *ngIf="errorMessage" class="text-red-500 text-sm text-center">
            {{ errorMessage }}
          </div>
          <!-- Botón -->
          <div class="flex justify-center mt-2">
            <button type="submit" [disabled]="loginForm.invalid"
              class="w-40 bg-[#00796B] hover:bg-[#004D40] text-white font-bold py-3 rounded-xl shadow-lg shadow-teal-950/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-sm disabled:opacity-50 disabled:cursor-not-allowed">
              Ingresar
            </button>
          </div>
        </form>
        <!-- Footer -->
        <div class="mt-8 flex items-center justify-center gap-2 py-2 px-4 bg-[#00796B]/10 rounded-xl">
          <span class="mso !text-base text-[#00796B]">lock_person</span>
          <span class="text-[9px] text-[#00796B] font-bold uppercase tracking-wider">
            Acceso Restringido y Cifrado
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
