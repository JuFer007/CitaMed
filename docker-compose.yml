services:

  mysql:
    image: mysql:8.0
    container_name: citamed-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    env_file:
      - docker.env
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - citamed
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: citamed-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - docker.env
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - citamed

  pdf-service:
    build:
      context: ./backend/node
      dockerfile: Dockerfile
    container_name: citamed-pdf
    restart: unless-stopped
    ports:
      - "3005:3005"
    networks:
      - citamed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: citamed-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - citamed

volumes:
  mysql_data:

networks:
  citamed:
    driver: bridge
